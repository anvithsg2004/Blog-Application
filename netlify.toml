# Root-level Netlify config.
# Netlify auto-detects this when you connect the Blog-Application repo and
# tells it to build from the Blog-Frontend subfolder. All other build
# settings (functions, redirects, dev) live in Blog-Frontend/netlify.toml.

[build]
  base = "Blog-Frontend"

# Required env vars on Netlify (Site settings → Environment variables):
#   GROQ_API_KEY    — your Groq key for AI summarize / qa
# Optional:
#   GROQ_MODEL          — defaults to "llama-3.1-8b-instant"
#   VITE_API_BASE_URL   — overrides the backend URL the SPA calls
