spring.application.name=Blog-Backend

# ---------------------------------------------------------------
# MongoDB
# ---------------------------------------------------------------
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.auto-index-creation=true

server.max-http-header-size=16384

# ---------------------------------------------------------------
# Mail (Gmail SMTP by default; override host/port if you switch)
# ---------------------------------------------------------------
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.smtp.ssl.trust=*
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectionpool=true
spring.mail.properties.mail.smtp.connectionpooltimeout=5000
spring.mail.properties.mail.smtp.connectionpoolsize=10

management.endpoints.web.exposure.include=health,info,metrics

# ---------------------------------------------------------------
# OAuth2 — GitHub
# ---------------------------------------------------------------
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

# ---------------------------------------------------------------
# OAuth2 — Google
# ---------------------------------------------------------------
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# ---------------------------------------------------------------
# Application-level config (frontend URLs, CORS, OAuth redirects)
# Pass CORS origins as a comma-separated list:
#   APP_CORS_ALLOWED_ORIGINS=https://aidenblog.netlify.app,http://localhost:5173
# ---------------------------------------------------------------
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:5173}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.oauth.success-url=${APP_OAUTH_SUCCESS_URL:${app.frontend.base-url}/login?success=oauth}
app.oauth.failure-url=${APP_OAUTH_FAILURE_URL:${app.frontend.base-url}/login?error=oauth_failed}

# ---------------------------------------------------------------
# Logging
# ---------------------------------------------------------------
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:INFO}
logging.level.com.blog.Blog_Backend.config=${LOG_LEVEL_APP_CONFIG:INFO}
logging.level.org.springframework.web=${LOG_LEVEL_WEB:INFO}
logging.level.org.springframework.data.mongodb.core.MongoTemplate=${LOG_LEVEL_MONGO:INFO}
logging.level.org.mongodb.driver.protocol=${LOG_LEVEL_MONGO_DRIVER:INFO}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ---------------------------------------------------------------
# Session cookie (cross-domain in production)
# ---------------------------------------------------------------
server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:none}
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:true}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.path=/
server.servlet.session.cookie.max-age=${SESSION_COOKIE_MAX_AGE:3600}
